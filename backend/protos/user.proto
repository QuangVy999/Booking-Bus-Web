syntax = "proto3";

package user;

service UserService {
  rpc Register(RegisterRequest) returns (UserResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetProfile(GetProfileRequest) returns (UserResponse);
  rpc AddSavedPassenger(AddSavedPassengerRequest) returns (SavedPassengerResponse);
  rpc GetSavedPassengers(GetSavedPassengersRequest) returns (SavedPassengersListResponse);
  rpc DeleteSavedPassenger(DeleteSavedPassengerRequest) returns (DeleteSavedPassengerResponse);
}

message User {
  int32 id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
  string role = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  User user = 1;
  string token = 2;
}

message GetProfileRequest {
  int32 id = 1;
}

message UserResponse {
  User user = 1;
}

message SavedPassenger {
  int32 id = 1;
  int32 user_id = 2;
  string name = 3;
  string email = 4;
  string phone = 5;
}

message AddSavedPassengerRequest {
  int32 user_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
}

message SavedPassengerResponse {
  SavedPassenger passenger = 1;
}

message GetSavedPassengersRequest {
  int32 user_id = 1;
}

message SavedPassengersListResponse {
  repeated SavedPassenger passengers = 1;
}

message DeleteSavedPassengerRequest {
  int32 id = 1;
}

message DeleteSavedPassengerResponse {
  bool success = 1;
}

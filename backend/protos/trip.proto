syntax = "proto3";

package trip;

service TripService {
  // Stops
  rpc CreateStop(CreateStopRequest) returns (Stop);
  rpc UpdateStop(UpdateStopRequest) returns (Stop);
  rpc DeleteStop(DeleteStopRequest) returns (DeleteResponse);
  rpc GetStops(Empty) returns (GetStopsResponse);

  // Routes
  rpc CreateRoute(CreateRouteRequest) returns (Route);
  rpc UpdateRoute(UpdateRouteRequest) returns (Route);
  rpc DeleteRoute(DeleteRouteRequest) returns (DeleteResponse);
  rpc GetRoutes(Empty) returns (GetRoutesResponse);

  // Vehicles
  rpc CreateVehicle(CreateVehicleRequest) returns (Vehicle);
  rpc UpdateVehicle(UpdateVehicleRequest) returns (Vehicle);
  rpc DeleteVehicle(DeleteVehicleRequest) returns (DeleteResponse);
  rpc GetVehicles(Empty) returns (GetVehiclesResponse);

  // Trips
  rpc CreateTrip(CreateTripRequest) returns (Trip);
  rpc UpdateTrip(UpdateTripRequest) returns (Trip);
  rpc DeleteTrip(DeleteTripRequest) returns (DeleteResponse);
  rpc GetTrips(GetTripsRequest) returns (GetTripsResponse);
  rpc UpdateTripStatus(UpdateTripStatusRequest) returns (Trip);
}

message Empty {}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

// STOP
message Stop {
  string id = 1;
  string name = 2;
  string address = 3;
}
message CreateStopRequest {
  string name = 1;
  string address = 2;
}
message UpdateStopRequest {
  string id = 1;
  string name = 2;
  string address = 3;
}
message DeleteStopRequest {
  string id = 1;
}
message GetStopsResponse {
  repeated Stop stops = 1;
}

// ROUTE
message Route {
  string id = 1;
  string name = 2;
  string start_stop_id = 3;
  string end_stop_id = 4;
}
message CreateRouteRequest {
  string name = 1;
  string start_stop_id = 2;
  string end_stop_id = 3;
}
message UpdateRouteRequest {
  string id = 1;
  string name = 2;
  string start_stop_id = 3;
  string end_stop_id = 4;
}
message DeleteRouteRequest {
  string id = 1;
}
message GetRoutesResponse {
  repeated Route routes = 1;
}

// VEHICLE
message Vehicle {
  string id = 1;
  string license_plate = 2;
  int32 total_seats = 3;
  string seat_map = 4; // JSON string
}
message CreateVehicleRequest {
  string license_plate = 1;
  int32 total_seats = 2;
  string seat_map = 3;
}
message UpdateVehicleRequest {
  string id = 1;
  string license_plate = 2;
  int32 total_seats = 3;
  string seat_map = 4;
}
message DeleteVehicleRequest {
  string id = 1;
}
message GetVehiclesResponse {
  repeated Vehicle vehicles = 1;
}

// TRIP
message Trip {
  string id = 1;
  string route_id = 2;
  string vehicle_id = 3;
  string departure_time = 4; // ISO format
  string arrival_time = 5;
  int32 price = 6;
  string status = 7; // PENDING, ACTIVE, LOCKED, DEPARTED, COMPLETED
}
message CreateTripRequest {
  string route_id = 1;
  string vehicle_id = 2;
  string departure_time = 3;
  string arrival_time = 4;
  int32 price = 5;
}
message UpdateTripRequest {
  string id = 1;
  string route_id = 2;
  string vehicle_id = 3;
  string departure_time = 4;
  string arrival_time = 5;
  int32 price = 6;
  string status = 7;
}
message DeleteTripRequest {
  string id = 1;
}
message GetTripsRequest {
  string route_id = 1;
  string status = 2;
}
message GetTripsResponse {
  repeated Trip trips = 1;
}
message UpdateTripStatusRequest {
  string id = 1;
  string status = 2;
}

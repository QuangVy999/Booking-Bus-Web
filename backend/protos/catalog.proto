syntax = "proto3";

package catalog;

service CatalogService {
  rpc SearchTrips(SearchTripsRequest) returns (SearchTripsResponse);
  rpc GetTripDetail(GetTripDetailRequest) returns (GetTripDetailResponse);
  
  // Admin CRUD endpoints
  rpc CreateRoute(CreateRouteRequest) returns (CreateRouteResponse);
  rpc GetRoutes(GetRoutesRequest) returns (GetRoutesResponse);
  rpc CreateVehicle(CreateVehicleRequest) returns (CreateVehicleResponse);
  rpc GetVehicles(GetVehiclesRequest) returns (GetVehiclesResponse);
  rpc CreateTrip(CreateTripRequest) returns (CreateTripResponse);
}

message Route {
  string id = 1;
  string origin = 2;
  string destination = 3;
  double distance = 4;
  string duration = 5;
}

message Vehicle {
  string id = 1;
  string plate_number = 2;
  string type = 3;
  int32 capacity = 4;
}

message Trip {
  string id = 1;
  Route route = 2;
  Vehicle vehicle = 3;
  string departure_time = 4;
  string arrival_time = 5;
  double price = 6;
  string status = 7;
  string bus_company = 8;
  int32 available_seats = 9;
}

message SearchTripsRequest {
  string origin = 1;
  string destination = 2;
  string date = 3;
}

message SearchTripsResponse {
  repeated Trip trips = 1;
  string suggested_date = 2;
}

message GetTripDetailRequest {
  string trip_id = 1;
}

message GetTripDetailResponse {
  Trip trip = 1;
}

message CreateRouteRequest {
  string origin = 1;
  string destination = 2;
  double distance = 3;
  string duration = 4;
}

message CreateRouteResponse {
  Route route = 1;
}

message GetRoutesRequest {}

message GetRoutesResponse {
  repeated Route routes = 1;
}

message CreateVehicleRequest {
  string plate_number = 1;
  string type = 2;
  int32 capacity = 3;
}

message CreateVehicleResponse {
  Vehicle vehicle = 1;
}

message GetVehiclesRequest {}

message GetVehiclesResponse {
  repeated Vehicle vehicles = 1;
}

message CreateTripRequest {
  string route_id = 1;
  string vehicle_id = 2;
  string departure_time = 3;
  string arrival_time = 4;
  double price = 5;
  string bus_company = 6;
}

message CreateTripResponse {
  Trip trip = 1;
}

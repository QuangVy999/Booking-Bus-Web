services:
  db_p3:
    image: postgres:15-alpine
    container_name: db_p3
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: seat_inventory_db
    ports:
      - "15433:5432"
    volumes:
      - db_data_p3:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d seat_inventory_db"]
      interval: 5s
      timeout: 30s
      retries: 5

  redis_p3:
    image: redis:7-alpine
    container_name: redis_p3
    ports:
      - "6380:6379"
    volumes:
      - redis_data_p3:/data

  rabbitmq_p3:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_p3
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: "admin123"
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka_p4
    ports:
      - "9092:9092"

  analytics-db:
    image: postgres:15-alpine
    container_name: analytics_db_p4
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: analytics_db
    ports:
      - "15434:5432"
    volumes:
      - analytics_db_data_p4:/var/lib/postgresql/data

  user-db:
    image: postgres:15-alpine
    container_name: user_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: user_db
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d user_db"]
      interval: 5s
      timeout: 30s
      retries: 5
    volumes:
      - user_db_data:/var/lib/postgresql/data

  trip-db:
    image: postgres:15-alpine
    container_name: trip_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: trip_db
    ports:
      - "15435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d trip_db"]
      interval: 5s
      timeout: 30s
      retries: 5
    volumes:
      - trip_db_data:/var/lib/postgresql/data


  nginx:
    image: nginx:alpine
    container_name: api_gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db_p3
      - user-db
      - trip-db
      - analytics-db

volumes:
  db_data_p3:
  redis_data_p3:
  rabbitmq_data_p3:
  user_db_data:
  analytics_db_data_p4:
  trip_db_data:
